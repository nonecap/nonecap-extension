name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build:ci

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: nonecap-extension-dist
          path: dist

  release:
    # Tag pushes only (v0.1.0, v1.2.3, ...): build, package and attach the
    # store zip to a GitHub release. The e2e suite is local-only by design
    # (MV3 extensions need headed Chromium) and is NOT run here.
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify tag matches manifest version
        run: |
          want="v$(jq -r .version package.json)"
          if [ "$want" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version ($want) — refusing to ship a mismatched zip. Bump the version or retag."
            exit 1
          fi

      - name: Package
        run: bun run package

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: nonecap-extension-v*.zip
          generate_release_notes: true
